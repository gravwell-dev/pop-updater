name: Syntax check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile-check pop_updater.py
        run: python3 -m py_compile pop_updater.py

      - name: Shellcheck install.sh syntax
        run: bash -n install.sh
